name: Java CI with Junit

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
      - run: javac -cp junit-5.9.3.jar src/*.java test/*.java
      - run: java -jar junit-platform-console-standalone-1.9.3.jar --scan-classpath
